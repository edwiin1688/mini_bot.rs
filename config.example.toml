version = "1.0"
default_provider = "minimax"
default_model = "minimax-coding-plan/MiniMax-M2.5"
# API Key: 優先從環境變數 MINIMAX_API_KEY 或 MINIBOT_API_KEY 讀取
api_key = ""

[gateway]
host = "127.0.0.1"
port = 3000

[gateway.security]
# API Key: 優先從環境變數 MINIBOT_GATEWAY_API_KEY 讀取
api_key = ""
rate_limit_requests = 10
rate_limit_window_secs = 60
allowed_origins = ["*"]
allowed_ips = []

[agent]
max_tool_iterations = 100
max_history_messages = 50
temperature = 0.7
max_execution_time_secs = 300

[security]
workspace_only = true
allowed_roots = []
allowed_commands = []
